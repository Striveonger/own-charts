apiVersion: v1
kind: Service
metadata:
  name: {{ include "ccx.fullname" . }}
  labels:
    {{- include "ccx.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  selector:
    {{- include "ccx.selectorLabels" . | nindent 4 }}
