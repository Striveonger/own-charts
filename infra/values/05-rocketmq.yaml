# RocketMQ values override for infrastructure deployment
# This file contains environment-specific configuration
# Other settings inherit from infra/05-rocketmq/values.yaml defaults

# Persistence configuration
persistence:
  data:
    size: 10Gi
    accessMode: ReadWriteOnce

# Resource configuration
nameserver:
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi

broker:
  resources:
    limits:
      memory: 2048Mi
    requests:
      memory: 1024Mi
